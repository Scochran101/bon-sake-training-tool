<style>

  /* Flashcard flip */
  .flip-card { perspective: 1200px; }
  .flip-inner { position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d; }

const FLASHCARDS = [
  { term:'NIGIRI',
    def:'Fresh raw fish served over a small hand-pressed ball of seasoned rice. Ordered by the piece (2pc unless noted). The fish is the star — the rice is just the vehicle.',
    fact:'Nigiri means "to grip" in Japanese — it is named for the way the chef hand-presses each piece, and it began as fast street food in 1800s Tokyo, eaten with the fingers.' },
  { term:'SASHIMI',
    def:'Fresh raw fish served alone — no rice, no roll. Thin sliced, pure protein. For the guest who wants the cleanest expression of the fish.',

  { term:'HOSOMAKI',
    def:'A thin roll with seaweed (nori) on the outside. Usually one or two ingredients. Simple, traditional. The seaweed wrapper is visible and intentional.',

  { term:'URAMAKI',
    def:'A roll with rice on the outside and seaweed on the inside. Most American-style rolls are uramaki. The rice is what you see first.',

    def:'A hand roll — seaweed cone shape, filled with ingredients. Not cut into pieces. Meant to be eaten immediately before the seaweed gets soft.',

function $(id){ return document.getElementById(id); }

function esc(str){ return String(str==null?'':str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showLoader(msg){ $('loaderText').textContent = msg || 'Loading…'; show($('loader')); }
function hideLoader(){ hide($('loader')); }
function shuffle(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(arr, n){ return shuffle(arr).slice(0, n); }
function titleCap(s){ return s.replace(/\b\w/g, c => c.toUpperCase()); }
function fmtPrice(p){ return (p==='' || p==null) ? '' : '$' + Number(p).toFixed(2); }
function fmtDate(iso){ if(!iso) return '—'; const d = new Date(iso); if(isNaN(d)) return '—'; return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function userKey(){ return ('bonsake_stats_' + (S.user?S.user.first_name:'') + '_' + (S.user?S.user.last_name:'')).toLowerCase(); }

/* ===========================================================================
   API CALLS
=========================================================================== */
// GET read request
async function apiGet(action, params){
  let url = API_URL + '?action=' + encodeURIComponent(action);
  if(params) for(const k in params) url += '&' + k + '=' + encodeURIComponent(params[k]);
  const res = await fetch(url, { method:'GET' });
  return res.json();
}
// POST write request — text/plain avoids a CORS preflight Apps Script can't answer
async function apiPost(data){
  const res = await fetch(API_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify(data)
  });
  return res.json();
}

   AUTH
=========================================================================== */
async function handleLogin(e){
  e.preventDefault();
  hide($('loginError'));
  const first = $('loginFirst').value.trim();
  const last  = $('loginLast').value.trim();
  const pin   = $('loginPin').value.trim();
  if(!first || !last || !pin){ return loginError('Please fill in every field.'); }

  showLoader('Signing you in…');
  try {
    const r = await doLogin(first, last, pin);
    hideLoader();
    if(!r.ok) return loginError(r.error || 'Name or PIN not recognized. See your manager.');
    enterApp();
  } catch(err){
    hideLoader();
    loginError('Something went wrong connecting to the server. Please try again.');
  }
}

// Shared login path used by both the form and silent session-restore on refresh.
async function doLogin(first, last, pin){
  const r = await apiPost({ action:'login', first, last, pin });
  if(!r.ok) return { ok:false, error:r.error };
  S.user = r.user;
  S.pin = pin;
  S.results = r.results || [];
  // Load the menu if we don't have it yet
  if(S.menu.length === 0){
    showLoader('Loading the menu…');
    const m = await apiGet('getMenu');
    if(!m.ok) return { ok:false, error:'Could not load the menu. Check your connection and try again.' };
    S.menu = m.food || [];
    S.drinksAvailable = !!m.drinksAvailable;
    S.pairingsAvailable = !!m.pairingsAvailable;
    canonicalizeMenu();        // collapse plural-duplicate ingredients before anything reads them
    buildIngredientIndex();
  }
  saveSession(first, last, pin);   // remember login so a pull-to-refresh restores it
  return { ok:true };
}

/* ---- Session persistence -------------------------------------------------
   sessionStorage survives a page refresh but clears when the tab/browser is
   closed — so a refresh keeps the user logged in, and fully closing the app
   (or tapping Log out) returns to the login screen. Good on shared devices.
-------------------------------------------------------------------------- */
function saveSession(first, last, pin){
  try { sessionStorage.setItem('bonsake_session', JSON.stringify({ first, last, pin })); } catch(e){}
}
function clearSession(){
  try { sessionStorage.removeItem('bonsake_session'); sessionStorage.removeItem('bonsake_tab'); } catch(e){}
}
async function restoreSession(){
  let s;
  try { s = JSON.parse(sessionStorage.getItem('bonsake_session') || 'null'); } catch(e){ s = null; }
  if(!s || !s.first || !s.last || !s.pin) return;
  showLoader('Welcome back…');
  try {
    const r = await doLogin(s.first, s.last, s.pin);
    hideLoader();
    if(!r.ok){ clearSession(); return; }   // stale creds (e.g. PIN was changed) → back to login
    enterApp({ fromRefresh:true });
  } catch(e){ hideLoader(); clearSession(); }
}

function loginError(msg){ const el = $('loginError'); el.textContent = msg; show(el); }

function enterApp(opts){
  opts = opts || {};
  hide($('view-login'));
  show($('view-main'));
  $('headerUser').textContent = S.user.first_name + ' ' + S.user.last_name;
  updateTeamTabVisibility();   // the Team tab only exists for managers
  // If they refreshed mid-test, it's logged as left-early and they land on the test list.
  const wasMidTest = checkAbandonedOnReturn();
  let tab = 'study';
  if(wasMidTest){
    tab = 'test';
  } else if(opts.fromRefresh){
    const saved = sessionStorage.getItem('bonsake_tab');
    if(saved && ['study','test','progress','team'].includes(saved)) tab = saved;
    if(tab === 'team' && !isManager()) tab = 'study';
  }
  switchTab(tab);
}

function updateTeamTabVisibility(){
  const btn = document.querySelector('.tabBtn[data-tab="team"]');
  if(btn) btn.classList.toggle('hidden', !isManager());
}

function logout(){
  // Log out is always allowed. If a test is in progress, leaving it counts as
  // abandoning the test — record it before exiting.
  if(S.testActive && S.test){
    const t = S.test;
    try {
      apiPost({ action:'logAbandon',
        first:S.user.first_name, last:S.user.last_name,
        test_section:t.section, test_level:t.level,
        timestamp_started: new Date(t.started).toISOString(),
        questions_completed: t.idx, total_questions: t.questions.length });
    } catch(e){}
    clearAbandonFlag();
  }
  S.testActive = false;
  S.test = null;
  S.user = null; S.pin = null; S.results = []; S.managerData = null;
  progressView = 'me';
  clearSession();   // forget the remembered login so a refresh won't bring it back
  S.study = { section:'All Items', itemId:null, showDetailMobile:false };
  applyNavLockStyles();
  $('loginForm').reset();
  hide($('view-main'));
  show($('view-login'));
  hide($('loginError'));
}

/* ===========================================================================
   INGREDIENT INDEX (for decoys + Level 2 word bank)
=========================================================================== */
// Canonical ingredient spellings. Collapses exact plural duplicates to the
// singular so the same ingredient can never appear twice in a word bank or as
// its own decoy (e.g. "scallions" → "scallion"). True synonyms that may carry a
// real kitchen distinction (e.g. green onion vs scallion) are intentionally
// left alone. Keys must be lowercase.
const ING_CANON = {
  'scallions': 'scallion',
  'carrots':   'carrot'
};
function canonIng(s){
  const t = String(s == null ? '' : s).trim();
  return ING_CANON[t.toLowerCase()] || t;
}
// Rewrites every menu item's ingredient list to canonical spellings, dropping
// any duplicate that collapses onto an ingredient already in the same item.
function canonicalizeMenu(){
  S.menu.forEach(it => {
    const seen = new Set(), out = [];
    (it.ingredients || []).forEach(ing => {
      const c = canonIng(ing); if(!c) return;
      const k = c.toLowerCase();
      if(!seen.has(k)){ seen.add(k); out.push(c); }
    });
    it.ingredients = out;
  });
}
function buildIngredientIndex(){
  const set = new Set();
  S.menu.forEach(it => it.ingredients.forEach(ing => { if(ing) set.add(ing.trim()); }));
  S.allIngredients = Array.from(set).sort((a,b) => a.toLowerCase().localeCompare(b.toLowerCase()));
}

/* ===========================================================================
   DECOY / OPTION-COUNT LOGIC  (exactly per brief)
=========================================================================== */
function optionCount(n){
  // <=8 ingredients -> x1.5 ; >=9 -> x1.25 ; round UP
  return (n <= 8) ? Math.ceil(n * 1.5) : Math.ceil(n * 1.25);
}
function buildSelectAll(item){
  const correct = item.ingredients.slice();
  const correctLower = new Set(correct.map(s => s.toLowerCase()));
  const total = optionCount(correct.length);
  const need = Math.max(0, total - correct.length);

  // decoy pool: ingredients from OTHER items, not present in this item, unique
  const poolSet = new Set();
  S.menu.forEach(it => {
    if(it.item_id === item.item_id) return;
    it.ingredients.forEach(ing => {
      const low = ing.toLowerCase();
      if(!correctLower.has(low)) poolSet.add(ing);
    });
  });
  // de-dup case-insensitively
  const seen = new Set(); const pool = [];
  poolSet.forEach(ing => { const l = ing.toLowerCase(); if(!seen.has(l)){ seen.add(l); pool.push(ing); } });

  const decoys = sample(pool, need);
  const options = shuffle(correct.concat(decoys));
  return { item, options, correct: new Set(correct) };
}

/* ===========================================================================
   TEST ENGINE
=========================================================================== */
let pendingTest = null;  // staged track+level until the anti-cheat modal is confirmed

function startTest(trackId, level){
  const track = TRACKS.find(t => t.id === trackId);
  if(!track || track.type === 'soon') return;
  if(track.type === 'roll' && level === 2 && !level2Unlocked(trackSection(track))) return lockedMsg();
  pendingTest = { track, level };
  show($('antiCheatModal'));   // must confirm before first question loads
}

function beginTestAfterModal(){
  hide($('antiCheatModal'));
  const { track, level } = pendingTest;
  const section = (track.type==='roll') ? trackSection(track) : trackResultSection(track);
  const pass = track.pass || PASS_DEFAULT;

  const questions = buildQuestions(track, level);
  S.test = {
    track, level, section, pass,
    questions, idx: 0, correct: 0, wrong: 0,
    missed: [], started: Date.now(), answered: false
  };
  S.testActive = true;
  applyNavLockStyles();
  setAbandonFlag();
  renderQuestion();
}

// Builds a Level-2 word bank: the item's true ingredients plus filler
// ingredients pulled from elsewhere on the menu, capped at WORDBANK_SIZE,
// then sorted alphabetically.
function buildWordBank(correct){
  const correctLower = new Set(correct.map(s => s.toLowerCase()));
  const need = Math.max(0, WORDBANK_SIZE - correct.length);
  const pool = S.allIngredients.filter(ing => !correctLower.has(ing.toLowerCase()));
  const bank = correct.concat(sample(pool, need));
  return bank.sort((a,b) => a.toLowerCase().localeCompare(b.toLowerCase()));
}

// Roll tests only cover dishes with 2+ ingredients. Single-ingredient items
// (plain nigiri, hosomaki, seaweed salad, etc.) are excluded everywhere in the
// Test tab — they make for trivial "select the one ingredient" questions.
function eligibleRollItems(track){
  const base = (track.section === '*ALL*') ? S.menu : S.menu.filter(it => it.section === track.section);
  return base.filter(it => (it.ingredients || []).length >= 2);
}

function buildQuestions(track, level){
  if(track.type === 'roll'){
    let items = shuffle(eligibleRollItems(track)).slice(0, MAX_ROLL_QUESTIONS);
    if(level === 2){
      return items.map(it => { const correct = it.ingredients.slice(); return { type:'wordbank', item:it, correct, bank: buildWordBank(correct) }; });
    }
    return items.map(it => { const q = buildSelectAll(it); return { type:'selectAll', item:it, options:q.options, correct:q.correct }; });
  }
  if(track.type === 'allergen'){
    const items = sample(S.menu, Math.min(ALLERGEN_QUESTIONS, S.menu.length));
    return items.map(it => {
      const correct = new Set(ALLERGEN_OPTIONS.filter(a => it.allergens[a.key]).map(a => a.label));
      return { type:'allergen', item:it, options: ALLERGEN_OPTIONS.map(a=>a.label), correct };
    });
  }
  if(track.type === 'know'){
    return shuffle(FLASHCARDS).map(card => {
      const distract = sample(FLASHCARDS.filter(f => f.term !== card.term), 3).map(f => f.def);
      const options = shuffle([card.def, ...distract]);
      return { type:'mcq', prompt: card.term, sub:'Which definition matches this term?', options, correctIndex: options.indexOf(card.def), fact: card.fact };
    });
  }
  if(track.type === 'description'){
    const described = S.menu.filter(it => it.sell_description);
    const chosen = sample(described, Math.min(DESC_QUESTIONS, described.length));
    return chosen.map(it => {
      const sameSec = S.menu.filter(x => x.section === it.section && x.item_id !== it.item_id);
      const distract = sample(sameSec, 3).map(x => x.item_name);
      const options = shuffle([it.item_name, ...distract]);
      return { type:'mcq', prompt: it.sell_description, sub:'Which menu item is this describing?', options, correctIndex: options.indexOf(it.item_name), item: it };
    });
  }
  if(track.type === 'upsell'){
    return UPSELL.map(u => ({ type:'mcq', prompt: u.s, sub:'What is the best response?', options: u.o.slice(), correctIndex: u.c, explanation: u.e, scenario:true }));
  }
  return [];
}

function renderQuestion(){
  const t = S.test;
  if(t.idx >= t.questions.length) return finishTest();
  t.answered = false;
  updateAbandonFlag();
  const q = t.questions[t.idx];
  const pct = Math.round((t.idx / t.questions.length) * 100);

  const header = `
    <div class="mb-4">
      <div class="flex items-center justify-between text-xs">
        <span class="text-gold uppercase tracking-wider">${esc(t.section)}${t.track.type==='roll' ? ' · Level ' + t.level : ''}</span>
        <span class="text-muted">Question ${t.idx+1} of ${t.questions.length}</span>
      </div>
      <div class="h-1.5 bg-line rounded-full mt-2 overflow-hidden"><div class="h-full bg-gold transition-all" style="width:${pct}%"></div></div>
      <p class="text-xs text-muted mt-1.5">${t.correct} correct · ${t.wrong} wrong</p>
    </div>`;

  let bodyHtml = '';
  if(q.type === 'selectAll' || q.type === 'allergen') bodyHtml = renderSelectAll(q);
  else if(q.type === 'wordbank')                      bodyHtml = renderWordBank(q);
  else if(q.type === 'mcq')                           bodyHtml = renderMCQ(q);

  $('tab-test').innerHTML = `<div class="max-w-2xl mx-auto">${header}<div id="qBody" class="fade-in">${bodyHtml}</div></div>`;
  if(q.type === 'wordbank') wbAfterRender(q);
}

/* ---- Select-all (roll Level 1 + allergen) -------------------------------- */
function renderSelectAll(q){
  const it = q.item;
  const photo = it.photo_url ? `<img src="${esc(it.photo_url)}" class="w-full h-40 object-cover rounded-lg border border-line mb-3" onerror="this.remove()"/>` : '';
  const isAllergen = q.type === 'allergen';
  const prompt = isAllergen
    ? `Select ALL allergens present in the <span class="text-text">${esc(it.item_name)}</span>. If it has none, submit with nothing selected.`
    : `Select ALL ingredients that belong in the <span class="text-text">${esc(it.item_name)}</span>.`;
  const cols = isAllergen ? 'grid-cols-2' : 'grid-cols-2';
  const opts = q.options.map((o,i) =>
    `<button data-opt="${i}" onclick="saToggle(this)" class="saOpt text-left bg-chip border border-line rounded-lg px-3 py-2.5 text-sm text-text transition-colors">${esc(o)}</button>`
  ).join('');

  return `
    ${photo}
    <p class="text-xs uppercase tracking-wider text-golddim">${esc(it.section)}</p>
    <h3 class="font-display text-2xl text-text mt-1 mb-3">${esc(it.item_name)}</h3>
    <p class="text-sm text-muted mb-3">${prompt}</p>
    <div id="saGrid" class="grid ${cols} gap-2">${opts}</div>
    <div id="saResult" class="mt-4"></div>
    <button id="saSubmit" onclick="submitSelectAll()" class="mt-4 w-full bg-gold text-bg font-semibold py-3 rounded-lg ${isAllergen?'':'opacity-40 pointer-events-none'}">Submit Answer</button>
    <button id="saNext" onclick="nextQuestion()" class="hidden mt-4 w-full bg-gold text-bg font-semibold py-3 rounded-lg">Next Question →</button>`;
}
function saToggle(btn){
  if(S.test.answered) return;
  btn.classList.toggle('bg-gold'); btn.classList.toggle('text-bg');
  btn.classList.toggle('bg-chip'); btn.classList.toggle('text-text');
  btn.dataset.sel = btn.dataset.sel ? '' : '1';
  const anySel = !!document.querySelector('#saGrid .saOpt[data-sel="1"]');
  const submit = $('saSubmit');
  const q = S.test.questions[S.test.idx];
  if(q.type !== 'allergen'){ submit.classList.toggle('opacity-40', !anySel); submit.classList.toggle('pointer-events-none', !anySel); }
}
function submitSelectAll(){
  const t = S.test; if(t.answered) return; t.answered = true;
  const q = t.questions[t.idx];
  const isAllergen = q.type === 'allergen';
  const correct = new Set(Array.from(q.correct).map(s => s.toLowerCase()));
  let allRight = true;
  document.querySelectorAll('#saGrid .saOpt').forEach(btn => {
    const label = btn.textContent.replace(/^[✗＋]\s/, '').trim();
    const isCorrect = correct.has(label.toLowerCase());
    const sel = !!btn.dataset.sel;
    btn.classList.remove('bg-gold','text-bg','bg-chip','text-text'); btn.classList.add('text-text');
    if(isAllergen){
      // Allergen test keeps its original reveal: only the allergens that are
      // actually present get marked; absent ones are left blank.
      if(isCorrect && sel){ saGlow(btn,'green'); }
      else if(isCorrect && !sel){ saGlow(btn,'green'); btn.innerHTML='＋ '+esc(label); allRight=false; }
      else if(!isCorrect && sel){ saGlow(btn,'red'); btn.innerHTML='✗ '+esc(label); allRight=false; }
    } else {
      // Ingredient test: every correct ingredient glows green (belongs in this
      // dish), every wrong one glows red (does not). The ✗ flags only the wrong
      // ones the team member actually selected; correct ones carry no marker.
      if(isCorrect){ saGlow(btn,'green'); if(!sel) allRight=false; }
      else { saGlow(btn,'red'); if(sel){ btn.innerHTML='✗ '+esc(label); allRight=false; } }
    }
  });
  gradeAndReveal(allRight, q.item);
  $('saSubmit').classList.add('hidden'); $('saNext').classList.remove('hidden');
}
// Applies the green ("belongs") or red ("does not belong") glow to an option.
function saGlow(btn, color){
  if(color === 'green'){
    btn.style.borderColor = '#27AE60';
    btn.style.background   = 'rgba(39,174,96,0.18)';
    btn.style.boxShadow    = '0 0 10px rgba(39,174,96,0.55)';
  } else {
    btn.style.borderColor = '#C0392B';
    btn.style.background   = 'rgba(192,57,43,0.18)';
    btn.style.boxShadow    = '0 0 10px rgba(192,57,43,0.55)';
  }
}

/* ---- Word bank (roll Level 2) -------------------------------------------- */
function renderWordBank(q){
  const it = q.item;
  const photo = it.photo_url ? `<img src="${esc(it.photo_url)}" class="w-full h-40 object-cover rounded-lg border border-line mb-3" onerror="this.remove()"/>` : '';
  const slots = q.correct.map((_,i) => `<div data-slot="${i}" onclick="wbClearSlot(${i})" class="wbSlot min-h-[42px] rounded-lg border border-dashed border-line bg-bg flex items-center justify-center px-2 text-sm text-muted"></div>`).join('');
  const bank = q.bank.map(ing => `<button data-ing="${esc(ing)}" onclick="wbPlace(this)" class="wbChip bg-chip border border-line rounded-full px-3 py-1.5 text-sm text-text mr-1.5 mb-1.5">${esc(ing)}</button>`).join('');
  return `
    ${photo}
    <p class="text-xs uppercase tracking-wider text-golddim">${esc(it.section)}</p>
    <h3 class="font-display text-2xl text-text mt-1 mb-1">${esc(it.item_name)}</h3>
    <p class="text-sm text-muted mb-3">Fill in all ${q.correct.length} ingredient${q.correct.length>1?'s':''} from the word bank. Tap a filled slot to clear it.</p>
    <div class="grid grid-cols-2 gap-2 mb-4">${slots}</div>
    <div id="wbResult" class="mb-3"></div>
    <p class="text-xs uppercase tracking-wider text-golddim mb-2">Word Bank</p>
    <div id="wbBank" class="flex flex-wrap max-h-56 overflow-y-auto no-scrollbar border border-line rounded-lg p-2">${bank}</div>
    <button id="wbSubmit" onclick="submitWordBank()" class="mt-4 w-full bg-gold text-bg font-semibold py-3 rounded-lg opacity-40 pointer-events-none">Submit Answer</button>
    <button id="wbNext" onclick="nextQuestion()" class="hidden mt-4 w-full bg-gold text-bg font-semibold py-3 rounded-lg">Next Question →</button>`;
}
function wbAfterRender(q){ /* slots start empty */ }
function wbPlace(chip){
  if(S.test.answered) return;
  const empty = Array.from(document.querySelectorAll('.wbSlot')).find(s => !s.dataset.filled);
  if(!empty) return;
  empty.textContent = chip.dataset.ing;
  empty.dataset.filled = chip.dataset.ing;
  empty.classList.remove('border-dashed','text-muted'); empty.classList.add('text-text','border-gold');
  chip.classList.add('hidden');
  wbCheckFull();
}
function wbClearSlot(i){
  if(S.test.answered) return;
  const slot = document.querySelector(`.wbSlot[data-slot="${i}"]`);
  if(!slot || !slot.dataset.filled) return;
  const ing = slot.dataset.filled;
  const chip = document.querySelector(`#wbBank .wbChip[data-ing="${cssEscape(ing)}"]`);
  if(chip) chip.classList.remove('hidden');
  slot.textContent=''; slot.removeAttribute('data-filled');
  slot.classList.add('border-dashed','text-muted'); slot.classList.remove('text-text','border-gold');
  slot.style.borderColor=''; slot.style.background='';
  wbCheckFull();
}
function cssEscape(s){ return String(s).replace(/["\\]/g,'\\$&'); }
function wbCheckFull(){
  const all = Array.from(document.querySelectorAll('.wbSlot')).every(s => s.dataset.filled);
  const sub = $('wbSubmit');
  sub.classList.toggle('opacity-40', !all); sub.classList.toggle('pointer-events-none', !all);
}
function submitWordBank(){
  const t = S.test; if(t.answered) return; t.answered = true;
  const q = t.questions[t.idx];
  const correct = new Set(q.correct.map(s => s.toLowerCase()));
  let allRight = true;
  document.querySelectorAll('.wbSlot').forEach(slot => {
    const val = (slot.dataset.filled||'').toLowerCase();
    if(correct.has(val)){ slot.style.borderColor='#27AE60'; slot.style.background='rgba(39,174,96,0.12)'; }
    else { slot.style.borderColor='#C0392B'; slot.style.background='rgba(192,57,43,0.12)'; allRight=false; }
  });
  if(!allRight){
    const chosen = new Set(Array.from(document.querySelectorAll('.wbSlot')).map(s => (s.dataset.filled||'').toLowerCase()));
    const missing = q.correct.filter(c => !chosen.has(c.toLowerCase()));
    if(missing.length) $('wbResult').innerHTML = `<p class="text-sm text-fail">Missing: ${esc(missing.join(', '))}</p>`;
  }
  gradeAndReveal(allRight, q.item, 'wbResult');
  $('wbSubmit').classList.add('hidden'); $('wbNext').classList.remove('hidden');
}

/* ---- Multiple choice (know / description / upsell) ----------------------- */
function renderMCQ(q){
  const opts = q.options.map((o,i) =>
    `<button data-opt="${i}" onclick="answerMCQ(${i})" class="mcqOpt w-full text-left bg-chip border border-line rounded-lg px-4 py-3 text-sm text-text transition-colors">${esc(o)}</button>`
  ).join('');
  const promptBlock = q.scenario
    ? `<div class="bg-surface border border-line rounded-lg p-4 mb-3"><p class="text-xs uppercase tracking-wider text-golddim mb-1">Scenario</p><p class="text-text">${esc(q.prompt)}</p></div>`
    : (q.item
        ? `<div class="border-l-2 border-gold pl-4 mb-3"><p class="font-display italic text-text leading-relaxed">${esc(q.prompt)}</p></div>`
        : `<h3 class="font-display text-3xl text-gold text-center my-4">${esc(q.prompt)}</h3>`);
  return `
    ${promptBlock}
    <p class="text-sm text-muted mb-3">${esc(q.sub)}</p>
    <div id="mcqGrid" class="space-y-2">${opts}</div>
    <div id="mcqResult" class="mt-4"></div>
    <button id="mcqNext" onclick="nextQuestion()" class="hidden mt-4 w-full bg-gold text-bg font-semibold py-3 rounded-lg">Next Question →</button>`;
}
function answerMCQ(i){
  const t = S.test; if(t.answered) return; t.answered = true;
  const q = t.questions[t.idx];
  document.querySelectorAll('#mcqGrid .mcqOpt').forEach((btn,bi) => {
    btn.classList.remove('bg-chip');
    if(bi === q.correctIndex){ btn.style.borderColor='#27AE60'; btn.style.background='rgba(39,174,96,0.15)'; }
    else if(bi === i){ btn.style.borderColor='#C0392B'; btn.style.background='rgba(192,57,43,0.15)'; }
    btn.classList.add('pointer-events-none');
  });
  const right = (i === q.correctIndex);
  let html = right ? `<p class="text-pass font-semibold">Correct.</p>` : `<p class="text-fail font-semibold">Not quite — the right answer is highlighted green.</p>`;
  if(q.explanation) html += `<p class="text-sm text-muted mt-2 leading-relaxed">${esc(q.explanation)}</p>`;
  if(q.fact) html += `<div class="border-l-2 border-gold pl-3 mt-3">
      <p class="text-xs uppercase tracking-wider text-golddim mb-1">Did you know?</p>
      <p class="text-sm text-text leading-relaxed">${esc(q.fact)}</p>
    </div>`;
  $('mcqResult').innerHTML = html;
  recordOutcome(right, q.item);
  $('mcqNext').classList.remove('hidden');
}

/* ---- Shared grading + reveal (for select-all / word bank) ---------------- */
function gradeAndReveal(allRight, item, resultElId){
  recordOutcome(allRight, item);
  const elId = resultElId || (S.test.questions[S.test.idx].type==='wordbank' ? 'wbResult' : 'saResult');
  const el = $(elId);
  const sell = item && item.sell_description
    ? `<div class="border-l-2 border-gold pl-3 mt-3"><p class="text-xs uppercase tracking-wider text-golddim mb-1">Here's how to sell it</p><p class="font-display italic text-text text-sm leading-relaxed">${esc(item.sell_description)}</p></div>`
    : '';
  const head = allRight ? `<p class="text-pass font-semibold">Correct!</p>` : `<p class="text-fail font-semibold">Not quite — review the highlights.</p>`;
  el.innerHTML = (el.innerHTML || '') + head + sell;
}

function recordOutcome(right, item){
  const t = S.test;
  if(right) t.correct++; else { t.wrong++; if(item) t.missed.push({ name:item.item_name, section:item.section }); }
  if(item) bumpItemStat(item.item_name, right);
}

function nextQuestion(){ S.test.idx++; renderQuestion(); }

/* ===========================================================================
   FINISH TEST + SCORE SCREEN
=========================================================================== */
async function finishTest(){
  const t = S.test;
  const total = t.questions.length;
  const pct = total>0 ? Math.round((t.correct/total)*100) : 0;
  const passed = pct >= t.pass;
  const duration = Math.round((Date.now() - t.started)/1000);

  // Save result
  showLoader('Saving your score…');
  let saveWarning = '';
  try {
    const r = await apiPost({
      action:'submitResult',
      first:S.user.first_name, last:S.user.last_name,
      test_section:t.section, test_level:t.level,
      score_correct:t.correct, score_total:total,
      pass_fail: passed?'PASS':'FAIL',
      duration_seconds:duration
    });
    if(r.ok){
      S.results.push({ test_section:t.section, test_level:t.level, score_correct:t.correct, score_total:total, score_percent:pct, pass_fail:passed?'PASS':'FAIL', date_taken:new Date().toISOString(), duration_seconds:duration });
    } else { saveWarning = 'Your score is shown below but could not be saved to the server.'; }
  } catch(err){ saveWarning = 'Your score is shown below but could not be saved (connection issue).'; }
  hideLoader();

  // Test is over — unlock nav and clear abandon flag
  S.testActive = false;
  clearAbandonFlag();
  applyNavLockStyles();

  // Build missed list with Study links where we have a menu item
  const missedUnique = [];
  const seen = new Set();
  t.missed.forEach(m => { if(!seen.has(m.name)){ seen.add(m.name); missedUnique.push(m); } });
  const missedHtml = missedUnique.length ? `
    <div class="mt-6 text-left">
      <p class="text-xs uppercase tracking-wider text-golddim mb-2">Items to review</p>
      <div class="space-y-1.5">
        ${missedUnique.map(m => {
          const it = S.menu.find(x => x.item_name === m.name);
          return `<div class="flex items-center justify-between bg-surface border border-line rounded-lg px-3 py-2">
            <span class="text-sm text-text">${esc(m.name)}</span>
            ${it?`<button onclick="openStudyItem('${it.item_id}')" class="text-xs text-gold">Study →</button>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  const levelUp = (t.track.type==='roll' && t.level===1 && passed) ? `<p class="text-pass text-sm mt-2">Level 2 is now unlocked.</p>` : '';
  const l2done  = (t.track.type==='roll' && t.level===2 && passed) ? `<p class="text-pass text-sm mt-2">You've completed both levels for ${esc(t.section)}. Your manager can see your results.</p>` : '';

  const msg = passed
    ? `<p class="font-display text-3xl text-pass">You passed.</p>${levelUp}${l2done}`
    : `<p class="font-display text-3xl text-fail">You didn't pass this time.</p><p class="text-muted text-sm mt-2">You need ${t.pass}% to pass. Review the items you missed and try again.</p>`;

  $('tab-test').innerHTML = `
    <div class="max-w-md mx-auto text-center fade-in">
      ${saveWarning?`<p class="text-fail text-xs mb-3">${esc(saveWarning)}</p>`:''}
      <p class="text-xs uppercase tracking-wider text-golddim">${esc(t.section)}${t.track.type==='roll'?' · Level '+t.level:''}</p>
      <div class="my-5">
        <p class="font-display text-6xl text-gold">${pct}%</p>
        <p class="text-muted text-sm mt-1">${t.correct} out of ${total} correct</p>
      </div>
      ${msg}
      ${missedHtml}
      <button onclick="returnToMenu()" class="mt-7 w-full bg-gold text-bg font-semibold py-3 rounded-lg">View My Progress →</button>
    </div>`;
  S.test = null;
}

// After finishing a test, send the user straight to their Progress tab (still logged in).

// Study link from the score screen — keeps the user logged in

  const it = S.menu.find(x => x.item_id === itemId);

  S.study.section = it.section;
  S.study.itemId = itemId;

}

   PROGRESS TAB

      <div><p class="text-sm text-text">${esc(m.name)}</p><p class="text-xs text-muted">${m.correct} of ${m.attempts} correct</p></div>

        <h2 class="font-display text-2xl text-text">Welcome back, ${esc(S.user.first_name)}</h2>

    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
      ${statCard('Overall Score', avg==null?'—':avg+'%')}
      ${statCard('Tests Taken', taken)}
      ${statCard('Strongest', `<span class="text-sm leading-tight block">${esc(strongest)}</span>`)}
      ${statCard('Needs Work', `<span class="text-sm leading-tight block">${esc(needs)}</span>`)}
    </div>

    <h3 class="text-sm uppercase tracking-wider text-golddim mb-2">Score by Section</h3>
    <div class="bg-surface border border-line rounded-xl p-4 mb-6">${bars}</div>

    <h3 class="text-sm uppercase tracking-wider text-golddim mb-2">Missed Most Often</h3>
    <div class="space-y-1.5 mb-6">${missedHtml}</div>

    <h3 class="text-sm uppercase tracking-wider text-golddim mb-2">Test History</h3>
    <div class="bg-surface border border-line rounded-xl p-4 overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead><tr class="text-golddim text-xs uppercase tracking-wider">
          <th class="pb-2 pr-2 font-medium">Date</th><th class="pb-2 pr-2 font-medium">Section</th><th class="pb-2 pr-2 font-medium">Lvl</th><th class="pb-2 pr-2 font-medium">Score</th><th class="pb-2 font-medium">Result</th>
        </tr></thead>
        <tbody>${history}</tbody>
      </table>
    </div>

    <div class="mt-6 text-center">
      <button onclick="switchTab('test')" class="bg-gold text-bg font-semibold px-6 py-2.5 rounded-lg">Start New Test</button>
    </div>`;
}

function toggleLeaderboard(){ progressView = progressView==='me' ? 'leaderboard' : 'me'; renderProgress(); }

/* ===========================================================================
   TEAM TAB  (managers only) — combined roster + add / edit / remove members
=========================================================================== */
function isManager(){ return !!(S.user && String(S.user.role||'').toLowerCase()==='manager'); }
let teamEditIdx = -1;   // index of the roster row currently being edited (-1 = none)

async function renderTeam(){
  const pane = $('tab-team');
  pane.innerHTML = `
    <h2 class="font-display text-2xl text-text mb-4">Team</h2>
    <div id="teamBody"><p class="text-muted text-sm">Loading team…</p></div>`;
  teamEditIdx = -1;
  try {
    const r = await apiPost({ action:'managerData', first:S.user.first_name, last:S.user.last_name, pin:S.pin });
    if(!r.ok){ $('teamBody').innerHTML = `<p class="text-fail text-sm">${esc(r.error||'Could not load team data.')}</p>`; return; }
    S.managerData = r;
    drawTeam(r);
  } catch(e){
    $('teamBody').innerHTML = `<p class="text-fail text-sm">Couldn't load the team. Check your connection.</p>`;
  }
}

function drawTeam(d){
  const staff = d.staff||[], results = d.results||[], abandoned = d.abandoned||[];

  // Aggregate each member's results (avg = all attempts, matching their Overall Score)
  const agg = {};
  results.forEach(x => {
    const name = (x.first_name+' '+x.last_name).trim();
    if(!agg[name]) agg[name] = { tests:0, sum:0 };
    agg[name].tests++; agg[name].sum += Number(x.score_percent||0);
  });

  // One combined table: Name · Tests · Avg · Date Added · PIN · Edit/Remove
  const rows = staff.map((s,i) => {
    const name = (s.first_name+' '+s.last_name).trim();
    const a = agg[name] || { tests:0, sum:0 };
    const avg = a.tests ? Math.round(a.sum/a.tests)+'%' : '—';
    const editing = (i === teamEditIdx);
    const roleCell = editing
      ? `<select id="team_role_${i}" class="bg-bg border border-line rounded px-1.5 py-1 text-[11px] text-text mt-1">${['Server','Bartender','Manager'].map(rr=>`<option ${String(s.role).toLowerCase()===rr.toLowerCase()?'selected':''}>${rr}</option>`).join('')}</select>`
      : `<span class="text-[11px] text-muted">${esc(s.role||'')}</span>`;
    const pinCell = editing
      ? `<input id="team_pin_${i}" inputmode="numeric" maxlength="4" value="${esc(s.pin)}" class="w-16 bg-bg border border-line rounded px-2 py-1 text-xs text-text tracking-widest"/>`
      : `<span class="text-text tracking-widest">${esc(s.pin)}</span>`;
    const actions = editing
      ? `<button onclick="teamSave(${i})" class="text-xs bg-gold text-bg rounded px-3 py-1.5 font-semibold">Save</button>
         <button onclick="teamCancel()" class="text-xs border border-line text-muted rounded px-3 py-1.5">Cancel</button>`
      : `<button onclick="teamEdit(${i})" class="text-xs border border-gold text-gold rounded px-3 py-1.5">Edit</button>
         <button onclick="teamRemove(${i})" class="text-xs border border-fail text-fail rounded px-3 py-1.5">Remove</button>`;
    return `<tr class="border-b border-line align-top">
      <td class="py-2 pr-3"><p class="text-sm text-text leading-tight">${esc(name)}</p>${roleCell}</td>
      <td class="py-2 pr-3 text-muted">${a.tests}</td>
      <td class="py-2 pr-3 text-text">${avg}</td>
      <td class="py-2 pr-3 text-muted whitespace-nowrap">${fmtDate(s.date_added)}</td>
      <td class="py-2 pr-3">${pinCell}</td>
      <td class="py-2"><div class="flex gap-1.5 flex-wrap">${actions}</div></td>
    </tr>`;
  }).join('') || `<tr><td colspan="6" class="py-3 text-muted text-sm">No team members yet.</td></tr>`;

  const abRows = abandoned.slice()
    .sort((x,y)=> new Date(y.timestamp_abandoned)-new Date(x.timestamp_abandoned))
    .map(x => `<tr class="border-b border-line">
      <td class="py-2 pr-2 text-text">${esc((x.first_name+' '+x.last_name).trim())}</td>
      <td class="py-2 pr-2 text-muted">${esc(x.test_section)}${x.test_level?(' · L'+x.test_level):''}</td>
      <td class="py-2 pr-2 text-muted">${x.questions_completed}/${x.total_questions}</td>
      <td class="py-2 text-muted whitespace-nowrap">${fmtDate(x.timestamp_abandoned)}</td>
    </tr>`).join('') || `<tr><td colspan="4" class="py-3 text-muted text-sm">No abandoned tests. 👍</td></tr>`;

  $('teamBody').innerHTML = `
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-sm uppercase tracking-wider text-golddim">Team Members</h3>
      <button onclick="teamShowAddPanel()" class="text-xs bg-gold text-bg rounded-lg px-3 py-2 font-semibold">+ Add Team Member</button>
    </div>

    <div id="teamAddPanel" class="hidden bg-surface border border-gold rounded-xl p-4 mb-4">
      <p class="text-xs uppercase tracking-wider text-golddim mb-2">Add Team Member</p>
      <div class="grid grid-cols-2 gap-2">
        <input id="add_first" placeholder="First name" autocomplete="off" class="bg-bg border border-line rounded px-3 py-2 text-sm text-text placeholder-muted" />
        <input id="add_last" placeholder="Last name" autocomplete="off" class="bg-bg border border-line rounded px-3 py-2 text-sm text-text placeholder-muted" />
        <select id="add_role" class="bg-bg border border-line rounded px-3 py-2 text-sm text-text">
          <option>Server</option><option>Bartender</option><option>Manager</option>
        </select>
        <input id="add_pin" inputmode="numeric" maxlength="4" placeholder="4-digit PIN" class="bg-bg border border-line rounded px-3 py-2 text-sm text-text tracking-widest placeholder-muted" />
      </div>
      <p id="teamMsg" class="text-xs mt-2"></p>
      <div class="flex gap-2 mt-2">
        <button onclick="teamAddMember()" class="flex-1 bg-gold text-bg font-semibold py-2.5 rounded-lg text-sm">Add</button>
        <button onclick="teamHideAddPanel()" class="flex-1 border border-line text-muted py-2.5 rounded-lg text-sm">Cancel</button>
      </div>
    </div>

    <div class="bg-surface border border-line rounded-xl p-4 mb-6 overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead><tr class="text-golddim text-xs uppercase tracking-wider">
          <th class="pb-2 pr-3 font-medium">Name</th><th class="pb-2 pr-3 font-medium">Tests</th><th class="pb-2 pr-3 font-medium">Avg</th><th class="pb-2 pr-3 font-medium">Date Added</th><th class="pb-2 pr-3 font-medium">PIN</th><th class="pb-2 font-medium">Actions</th>
        </tr></thead><tbody>${rows}</tbody>
      </table>
    </div>

    <h3 class="text-sm uppercase tracking-wider text-golddim mb-2">Abandoned Tests</h3>
    <div class="bg-surface border border-line rounded-xl p-4 overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead><tr class="text-golddim text-xs uppercase tracking-wider">
          <th class="pb-2 pr-2 font-medium">Name</th><th class="pb-2 pr-2 font-medium">Test</th><th class="pb-2 pr-2 font-medium">Done</th><th class="pb-2 font-medium">When</th>
        </tr></thead><tbody>${abRows}</tbody>
      </table>
    </div>`;
}

function teamMsg(msg, ok){
  const el = $('teamMsg'); if(!el) return;
  el.textContent = msg; el.className = 'text-xs mt-2 ' + (ok?'text-pass':'text-fail');
}
function teamShowAddPanel(){ teamEditIdx = -1; drawTeam(S.managerData); const p = $('teamAddPanel'); if(p) p.classList.remove('hidden'); }
function teamHideAddPanel(){ const p = $('teamAddPanel'); if(p) p.classList.add('hidden'); }
function teamEdit(i){ teamEditIdx = i; drawTeam(S.managerData); }
function teamCancel(){ teamEditIdx = -1; drawTeam(S.managerData); }

async function teamAddMember(){
  const first=$('add_first').value.trim(), last=$('add_last').value.trim(), role=$('add_role').value, pin=$('add_pin').value.trim();
  if(!first||!last||!pin) return teamMsg('First name, last name, and PIN are required.', false);
  if(!/^\d{4}$/.test(pin)) return teamMsg('PIN must be exactly 4 digits.', false);
  showLoader('Adding team member…');
  try {
    const r = await apiPost({ action:'addStaff', first:S.user.first_name, last:S.user.last_name, pin:S.pin,
      new_first:first, new_last:last, new_role:role, new_pin:pin });
    hideLoader();
    if(!r.ok) return teamMsg(r.error||'Could not add team member.', false);
    renderTeam();
  } catch(e){ hideLoader(); teamMsg('Connection error. Try again.', false); }
}

async function teamSave(i){
  const s = (S.managerData.staff||[])[i]; if(!s) return;
  const role = $('team_role_'+i).value, pin = $('team_pin_'+i).value.trim();
  if(pin && !/^\d{4}$/.test(pin)){ alert('PIN must be exactly 4 digits.'); return; }
  showLoader('Saving…');
  try {
    const r = await apiPost({ action:'updateStaff', first:S.user.first_name, last:S.user.last_name, pin:S.pin,
      target_first:s.first_name, target_last:s.last_name, new_role:role, new_pin:pin });
    hideLoader();
    if(!r.ok){ alert(r.error||'Could not save.'); return; }
    teamEditIdx = -1; renderTeam();
  } catch(e){ hideLoader(); alert('Connection error. Try again.'); }
}

async function teamRemove(i){
  const s = (S.managerData.staff||[])[i]; if(!s) return;
  const name = (s.first_name+' '+s.last_name).trim();
  if(!confirm('Remove '+name+"? This deletes their login. Their past test results stay in the sheet.")) return;
  showLoader('Removing…');
  try {
    const r = await apiPost({ action:'removeStaff', first:S.user.first_name, last:S.user.last_name, pin:S.pin,
      target_first:s.first_name, target_last:s.last_name });
    hideLoader();
    if(!r.ok){ alert(r.error||'Could not remove.'); return; }
    teamEditIdx = -1; renderTeam();
  } catch(e){ hideLoader(); alert('Connection error. Try again.'); }
}

async function renderLeaderboard(){
  const pane = $('tab-progress');
  pane.innerHTML = `<div class="flex items-center justify-between mb-4">
      <h2 class="font-display text-2xl text-text">Leaderboard</h2>
      <button onclick="toggleLeaderboard()" class="text-xs border border-line text-gold rounded-lg px-3 py-2">My Progress</button>
    </div>
    <div id="lbBody" class="bg-surface border border-line rounded-xl p-4"><p class="text-muted text-sm">Loading leaderboard…</p></div>`;
  try {
    const r = await apiGet('getLeaderboard');
    const rows = (r.leaderboard||[]);
    const me = (S.user.first_name + ' ' + S.user.last_name).toLowerCase();
    const html = rows.length ? `
      <table class="w-full text-sm text-left">
        <thead><tr class="text-golddim text-xs uppercase tracking-wider">
          <th class="pb-2 pr-2 font-medium">#</th><th class="pb-2 pr-2 font-medium">Name</th><th class="pb-2 pr-2 font-medium">Tests</th><th class="pb-2 pr-2 font-medium">Avg</th><th class="pb-2 font-medium">Last Active</th>
        </tr></thead>
        <tbody>${rows.map((row,i) => {
          const mine = row.name.toLowerCase()===me;
          return `<tr class="border-b border-line ${mine?'bg-gold/10':''}">
            <td class="py-2 pr-2 ${mine?'text-gold':'text-muted'}">${i+1}</td>
            <td class="py-2 pr-2 ${mine?'text-gold font-semibold':'text-text'}">${esc(row.name)}</td>
            <td class="py-2 pr-2 text-muted">${row.tests_taken}</td>
            <td class="py-2 pr-2 text-text">${row.avg_score}%</td>
            <td class="py-2 text-muted whitespace-nowrap">${fmtDate(row.last_active)}</td>

  }
}

/* ===========================================================================
   DEVICE-LOCAL ITEM MISS TRACKING  (powers "Missed Most Often")
   Test Results only stores aggregate scores, so per-item misses are kept
   in this device's localStorage, keyed by the staff member's name.
=========================================================================== */
function loadStats(){ try { return JSON.parse(localStorage.getItem(userKey()) || '{}'); } catch(e){ return {}; } }
function saveStats(o){ try { localStorage.setItem(userKey(), JSON.stringify(o)); } catch(e){} }
function bumpItemStat(name, right){
  const s = loadStats();
  if(!s[name]) s[name] = { attempts:0, correct:0 };
  s[name].attempts++; if(right) s[name].correct++;
  saveStats(s);
}
function topMissedItems(){
  const s = loadStats();
  return Object.keys(s).map(name => ({ name, attempts:s[name].attempts, correct:s[name].correct, wrong:s[name].attempts-s[name].correct }))
    .filter(x => x.wrong > 0)
    .sort((a,b) => b.wrong - a.wrong || (a.correct/a.attempts) - (b.correct/b.attempts))
    .slice(0,6);
}

/* ===========================================================================
   ABANDONED-SESSION TRACKING
   On test start we store a flag. If the page reloads/reopens while a test
   is unfinished, we log it to the Abandoned Sessions tab on return.
=========================================================================== */
function abandonKey(){ return 'bonsake_active_test'; }
function setAbandonFlag(){
  const t = S.test;
  sessionStorage.setItem(abandonKey(), JSON.stringify({
    first:S.user.first_name, last:S.user.last_name,
    section:t.section, level:t.level,
    started:t.started, completed:0, total:t.questions.length
  }));
}
function updateAbandonFlag(){
  const raw = sessionStorage.getItem(abandonKey()); if(!raw) return;
  try { const o = JSON.parse(raw); o.completed = S.test.idx; sessionStorage.setItem(abandonKey(), JSON.stringify(o)); } catch(e){}
}
function clearAbandonFlag(){ sessionStorage.removeItem(abandonKey()); }
// Returns true if a test was left unfinished (so the caller can drop the user on the test list).
function checkAbandonedOnReturn(){
  const raw = sessionStorage.getItem(abandonKey());
  if(!raw) return false;
  let o; try { o = JSON.parse(raw); } catch(e){ sessionStorage.removeItem(abandonKey()); return false; }
  sessionStorage.removeItem(abandonKey());
  // Fire-and-forget log so the UI can restore without waiting on the network
  try {
    apiPost({
      action:'logAbandon',
      first:o.first, last:o.last, test_section:o.section, test_level:o.level,
      timestamp_started: new Date(o.started).toISOString(),
      questions_completed:o.completed, total_questions:o.total
    });
  } catch(e){}
  setTimeout(() => alert('You left your test early. This has been logged.'), 400);
  return true;
}
